<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="雅思听力词汇与同义替换练习站，支持看中文打英文、同义替换选择/输入练习、错题复习和本地进度保存。"
    />
    <title>雅思听力词汇与同义替换练习站</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app-shell">
      <header id="site-header" aria-label="站点简介">
        <div id="brand-area">
          <p id="site-eyebrow">IELTS Listening Vocabulary</p>
          <h1 id="site-title">雅思听力词汇与同义替换练习站</h1>
          <p id="site-summary">
            单词练习和同义替换练习放在同一个站点里：既能按场景背高频词，也能单独练听力里常见的替换表达，
            支持输入题、选择题、错题复习、本地进度保存，以及“看答案后再自己输对”的强化流程。
          </p>
        </div>
      </header>

      <main id="main-content">
        <section id="controls-section" aria-labelledby="controls-title">
          <h2 id="controls-title">练习设置</h2>
          <div id="controls-mount" data-mount="controls"></div>
        </section>

        <section id="practice-section" aria-labelledby="practice-title">
          <h2 id="practice-title">练习区</h2>
          <div id="practice-mount" data-mount="practice"></div>
        </section>

        <section id="stats-section" aria-labelledby="stats-title">
          <h2 id="stats-title">学习统计</h2>
          <div id="stats-mount" data-mount="stats"></div>
        </section>

        <section id="results-section" aria-labelledby="results-title">
          <h2 id="results-title">错题与总结</h2>
          <div id="results-mount" data-mount="results"></div>
        </section>
      </main>
    </div>

    <script src="./vocab-data.js" defer></script>
    <script src="./synonym-data.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
