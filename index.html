<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="一个本地可打开的雅思听力与阅读练习站，包含词汇打字练习、同义替换训练、错题复习和本地进度保存。"
    />
    <title>雅思听力与阅读练习站</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app-shell">
      <header id="site-header" aria-label="站点介绍">
        <div id="brand-area">
          <p id="site-eyebrow">IELTS Listening</p>
          <h1 id="site-title">雅思听力与阅读练习站</h1>
          <p id="site-summary">
            保留原来的听力词汇与同义替换练习，并把整个站点升级成听力 / 阅读双模块结构，方便你按模块打字、刷词、做同义替换和错题复习。
          </p>
        </div>
      </header>

      <main id="main-content">
        <section id="controls-section" aria-labelledby="controls-title">
          <h2 id="controls-title">练习设置</h2>
          <div id="controls-mount" data-mount="controls"></div>
        </section>

        <section id="practice-section" aria-labelledby="practice-title">
          <h2 id="practice-title">当前练习</h2>
          <div id="practice-mount" data-mount="practice"></div>
        </section>

        <section id="stats-section" aria-labelledby="stats-title">
          <h2 id="stats-title">学习统计</h2>
          <div id="stats-mount" data-mount="stats"></div>
        </section>

        <section id="results-section" aria-labelledby="results-title">
          <h2 id="results-title">结果与错题</h2>
          <div id="results-mount" data-mount="results"></div>
        </section>
      </main>
    </div>

    <script src="./vocab-data.js" defer></script>
    <script src="./reading-vocab-data.js" defer></script>
    <script src="./synonym-data.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
